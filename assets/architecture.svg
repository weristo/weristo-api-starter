<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Weristo API Starter architecture">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0a0a0f"/><stop offset="1" stop-color="#071a20"/></linearGradient>
    <linearGradient id="cyan" x1="0" x2="1"><stop offset="0" stop-color="#00e5ff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="70" fill="#00e5ff" font-family="Orbitron, monospace" font-size="28" font-weight="800" letter-spacing="5">WERISTO API STARTER</text>
  <text x="60" y="108" fill="#c9d1d9" font-family="Inter, Arial" font-size="18">Bring your own AI key. Route multilingual business events safely.</text>
  <g font-family="Inter, Arial" font-size="17" font-weight="700">
    <rect x="60" y="180" width="190" height="92" rx="20" fill="#111827" stroke="#00e5ff" opacity=".95"/>
    <text x="92" y="222" fill="#fff">Incoming event</text><text x="92" y="248" fill="#8b949e" font-size="13">WA / TG / Email / Voice</text>
    <rect x="315" y="180" width="190" height="92" rx="20" fill="#111827" stroke="#00e5ff" opacity=".95"/>
    <text x="352" y="222" fill="#fff">Workflow API</text><text x="352" y="248" fill="#8b949e" font-size="13">validate + normalize</text>
    <rect x="570" y="180" width="190" height="92" rx="20" fill="#111827" stroke="#00e5ff" opacity=".95"/>
    <text x="609" y="222" fill="#fff">Tenant routing</text><text x="609" y="248" fill="#8b949e" font-size="13">roles + language</text>
    <rect x="825" y="180" width="220" height="92" rx="20" fill="#111827" stroke="#00e5ff" opacity=".95"/>
    <text x="866" y="222" fill="#fff">User-owned AI</text><text x="866" y="248" fill="#8b949e" font-size="13">BYO provider key</text>
    <rect x="430" y="370" width="340" height="100" rx="24" fill="#10131c" stroke="#7c3aed" opacity=".98" filter="url(#glow)"/>
    <text x="506" y="414" fill="#fff">Localized action</text><text x="486" y="442" fill="#8b949e" font-size="14">summary, task, alert, translation</text>
    <rect x="850" y="370" width="230" height="100" rx="24" fill="#10131c" stroke="#00e5ff" opacity=".98"/>
    <text x="900" y="414" fill="#fff">Notify recipient</text><text x="895" y="442" fill="#8b949e" font-size="14">not the platform owner</text>
  </g>
  <g stroke="url(#cyan)" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M250 226 H315"/><path d="M505 226 H570"/><path d="M760 226 H825"/><path d="M935 272 C935 330 720 340 650 370"/><path d="M770 420 H850"/>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#00e5ff"/></marker></defs>
  <text x="60" y="560" fill="#8b949e" font-family="Inter, Arial" font-size="14">Public blueprint only. No private Weristo backend, prompts, memory, keys, or customer data.</text>
</svg>
